<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Key Picker - Fridge Combo</title>
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #fafafa;
            --radius: 15px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h1 { font-size: 1.5rem; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; opacity: 0.6; }
        
        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid var(--main);
            border-radius: var(--radius);
            background: var(--accent);
            font-family: monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        .btn {
            background: var(--main);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }
        .btn:active { opacity: 0.8; }

        #keyContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 40px;
        }
        .key-chip {
            padding: 8px 15px;
            background: var(--accent);
            border: 1px solid #ddd;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }
        .key-chip.selected {
            background: var(--main);
            color: #fff;
            border-color: var(--main);
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 11px;
            color: #bbb;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .kofi-link {
            display: inline-block;
            background: var(--main);
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-weight: 700;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>JSON Key Picker</h1>
    </header>

    <div>
        <label>Input JSON</label>
        <textarea id="inputJson" placeholder='Paste your JSON here...'></textarea>
    </div>

    <button class="btn" onclick="analyzeJson()">Analyze Keys</button>

    <div id="keySelectorSection" style="display:none;">
        <label>Select Keys to Keep</label>
        <div id="keyContainer"></div>
    </div>

    <div>
        <label>Result</label>
        <textarea id="outputJson" readonly placeholder="Result will appear here..."></textarea>
        <button class="btn" style="margin-top:10px;" onclick="copyResult()">Copy Result</button>
    </div>

    <footer>
        <a href="https://ko-fi.com/afrorakda" class="kofi-link">☕ Support me on Ko-fi</a>
        <p>No login / No tracking / No ads / Browser only Privacy Policy<br>afrorakda © 2026</p>
    </footer>
</div>

<script>
    let currentData = null;
    let selectedKeys = new Set();

    function analyzeJson() {
        const input = document.getElementById('inputJson').value.trim();
        const container = document.getElementById('keyContainer');
        const section = document.getElementById('keySelectorSection');
        
        try {
            currentData = JSON.parse(input);
            if (typeof currentData !== 'object' || currentData === null) {
                throw new Error('Not an object');
            }
            
            const keys = Object.keys(currentData);
            container.innerHTML = '';
            selectedKeys.clear();
            
            keys.forEach(key => {
                const chip = document.createElement('div');
                chip.className = 'key-chip';
                chip.textContent = key;
                chip.onclick = () => toggleKey(key, chip);
                container.appendChild(chip);
            });
            
            section.style.display = 'block';
            updateResult();
        } catch (e) {
            alert('Invalid JSON: Please check your format.');
            section.style.display = 'none';
        }
    }

    function toggleKey(key, element) {
        if (selectedKeys.has(key)) {
            selectedKeys.delete(key);
            element.classList.remove('selected');
        } else {
            selectedKeys.add(key);
            element.classList.add('selected');
        }
        updateResult();
    }

    function updateResult() {
        if (!currentData) return;
        
        const result = {};
        selectedKeys.forEach(key => {
            result[key] = currentData[key];
        });
        
        document.getElementById('outputJson').value = 
            selectedKeys.size > 0 ? JSON.stringify(result, null, 2) : '';
    }

    function copyResult() {
        const output = document.getElementById('outputJson');
        if (!output.value) return;
        output.select();
        document.execCommand('copy');
        alert('Copied to clipboard!');
    }
</script>

</body>
</html>

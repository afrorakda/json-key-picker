<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Key Picker - Fridge Combo</title>
    <link rel="apple-touch-icon" href="image_29.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            text-align: center;
        }
        h1 { font-size: 2.2rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 0.9rem; color: #bbb; margin-bottom: 30px; font-weight: 500; }
        
        .section-label { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 800; color: #bbb; margin-bottom: 8px; text-transform: uppercase; }

        textarea {
            width: 100%;
            height: 180px;
            padding: 20px;
            border: none;
            border-radius: var(--radius);
            background: var(--input-bg);
            font-family: monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            margin-bottom: 20px;
        }

        .key-area { display: none; text-align: left; margin-bottom: 20px; }
        #keyContainer { display: flex; flex-wrap: wrap; gap: 8px; }
        .key-chip {
            padding: 10px 15px;
            background: var(--input-bg);
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .key-chip.selected { background: var(--main); color: #fff; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn {
            padding: 20px;
            border-radius: var(--radius);
            border: none;
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-main { background: var(--main); color: #fff; }
        .btn-sub { background: var(--accent); color: var(--main); }

        footer { margin-top: 50px; }
        .kofi-btn {
            display: inline-flex;
            align-items: center;
            background: var(--main);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .add-home {
            display: block;
            background: var(--accent);
            color: var(--main);
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            width: fit-content;
            margin: 0 auto 20px;
        }
        .legal { font-size: 10px; color: #ccc; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>JSON Key Picker</h1>
    <p class="subtitle">Extract specific keys from your JSON data.</p>

    <div class="section-label"><span>Paste JSON Here</span></div>
    <textarea id="input" placeholder='{"id":1, "name":"item"}' oninput="autoAnalyze()"></textarea>

    <div class="key-area" id="keyWrapper">
        <div class="section-label"><span>Pick Keys</span></div>
        <div id="keyContainer"></div>
    </div>

    <div class="btn-group">
        <button class="btn btn-sub" onclick="location.reload()">Clear</button>
        <button class="btn btn-main" onclick="copyResult()">Copy Result</button>
    </div>

    <footer>
        <a href="https://ko-fi.com/afrorakda" class="kofi-btn">☕ Support me on Ko-fi</a>
        <a href="#" class="add-home">Add to Home Screen</a>
        <p class="legal">No login / No tracking / No ads / Browser only<br>afrorakda © 2026</p>
    </footer>
</div>

<script>
    let rawData = null;
    let selectedKeys = new Set();

    function autoAnalyze() {
        const val = document.getElementById('input').value.trim();
        if(!val) return;
        try {
            rawData = JSON.parse(val);
            const sample = Array.isArray(rawData) ? rawData[0] : rawData;
            const container = document.getElementById('keyContainer');
            container.innerHTML = '';
            selectedKeys.clear();

            Object.keys(sample).forEach(key => {
                const chip = document.createElement('div');
                chip.className = 'key-chip';
                chip.textContent = key;
                chip.onclick = () => {
                    chip.classList.toggle('selected');
                    selectedKeys.has(key) ? selectedKeys.delete(key) : selectedKeys.add(key);
                };
                container.appendChild(chip);
            });
            document.getElementById('keyWrapper').style.display = 'block';
        } catch(e) {}
    }

    function copyResult() {
        if(!rawData || selectedKeys.size === 0) return;
        const process = (obj) => {
            let res = {};
            selectedKeys.forEach(k => { if(k in obj) res[k] = obj[k]; });
            return res;
        };
        const result = Array.isArray(rawData) ? rawData.map(process) : process(rawData);
        
        const dummy = document.createElement('textarea');
        document.body.appendChild(dummy);
        dummy.value = JSON.stringify(result, null, 2);
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);
        alert('Copied picked JSON!');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Key Picker - Fridge Combo</title>
    <link rel="apple-touch-icon" href="image_29.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #fafafa;
            --radius: 15px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 10px 15px; /* 上下左右を詰め */
            display: flex;
            flex-direction: column;
        }
        h1 { font-size: 1.3rem; font-weight: 800; margin: 0 0 10px 0; letter-spacing: -0.5px; }
        .group { margin-bottom: 8px; } /* 各セクションの余白を詰め */
        label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; opacity: 0.5; display: block; margin-bottom: 2px; }
        
        textarea {
            width: 100%;
            height: 65px; /* 大幅に縮小 */
            padding: 10px;
            border: 2px solid var(--main);
            border-radius: var(--radius);
            background: var(--accent);
            font-family: monospace;
            font-size: 12px;
            resize: none;
            outline: none;
            display: block;
        }

        .btn {
            background: var(--main);
            color: #fff;
            border: none;
            padding: 12px; /* 少し詰め */
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
        }

        #keyContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 4px;
        }
        .key-chip {
            padding: 5px 10px;
            background: var(--accent);
            border: 1px solid #eee;
            border-radius: var(--radius);
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
        }
        .key-chip.selected {
            background: var(--main);
            color: #fff;
        }

        footer {
            margin-top: 20px; /* 詰め */
            text-align: center;
            font-size: 10px;
            color: #bbb;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .hub-link, .kofi-link {
            display: block; /* 縦に並べる */
            text-decoration: none;
            padding: 10px;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 6px; /* 詰め */
        }
        .hub-link {
            background: var(--accent);
            color: var(--main);
            border: 2px solid var(--main);
            margin-bottom: 8px; /* footer textとの間 */
        }
        .kofi-link {
            background: var(--main);
            color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>JSON Key Picker</h1>

    <div class="group">
        <label>Input JSON</label>
        <textarea id="inputJson" placeholder='Paste JSON here...'></textarea>
        <button class="btn" onclick="analyze()">Extract Keys</button>
    </div>

    <div class="group" id="selectorWrapper" style="display:none;">
        <label>Select Keys</label>
        <div id="keyContainer"></div>
    </div>

    <div class="group">
        <label>Result</label>
        <textarea id="outputJson" readonly></textarea>
        <button class="btn" onclick="copyText()">Copy Result</button>
    </div>

    <footer>
        <a href="https://afrorakda.github.io/Fridge-Combo/" class="hub-link">🏠 afrorakda Hub</a>
        <a href="https://ko-fi.com/afrorakda" class="kofi-link">☕ Support me on Ko-fi</a>
        <p>No login / No tracking / No ads / Browser only Privacy Policy<br>afrorakda © 2026</p>
    </footer>
</div>

<script>
    let data = null;
    let selected = new Set();

    function analyze() {
        const val = document.getElementById('inputJson').value.trim();
        if(!val) return;
        try {
            data = JSON.parse(val);
            const container = document.getElementById('keyContainer');
            container.innerHTML = '';
            selected.clear();
            
            // 配列かオブジェクトか判断
            const sample = Array.isArray(data) ? data[0] : data;
            if (typeof sample !== 'object' || sample === null) throw new Error();

            Object.keys(sample).forEach(k => {
                const span = document.createElement('span');
                span.className = 'key-chip';
                span.textContent = k;
                span.onclick = () => {
                    span.classList.toggle('selected');
                    selected.has(k) ? selected.delete(k) : selected.add(k);
                    render();
                };
                container.appendChild(span);
            });
            document.getElementById('selectorWrapper').style.display = 'block';
            render();
        } catch(e) { alert('Invalid JSON format'); }
    }

    function render() {
        if(!data) return;
        const process = (obj) => {
            let res = {};
            selected.forEach(k => { if(k in obj) res[k] = obj[k]; });
            return res;
        };
        const result = Array.isArray(data) ? data.map(process) : process(data);
        document.getElementById('outputJson').value = selected.size ? JSON.stringify(result, null, 2) : '';
    }

    function copyText() {
        const out = document.getElementById('outputJson');
        if(!out.value) return;
        out.select();
        document.execCommand('copy');
        alert('Copied!');
    }
</script>

</body>
</html>

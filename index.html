<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSON Key Picker</title>
    <link rel="apple-touch-icon" href="image_29.png">
    <style>
        :root { --bg: #fff; --main: #000; --accent: #eee; --radius: 15px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: #fff; color: #000; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 420px; padding: 40px 20px; text-align: center; }
        h1 { font-size: 2.2rem; font-weight: 900; margin: 0; color: #000 !important; }
        .subtitle { font-size: 0.9rem; color: #666; margin-bottom: 30px; }
        .label { font-size: 0.7rem; font-weight: 800; color: #333; text-align: left; text-transform: uppercase; margin-bottom: 5px; }
        
        /* 視認性のための絶対的指定 */
        textarea {
            width: 100%; height: 160px; padding: 20px; border: 2px solid #000; border-radius: 15px;
            background: #fff !important; color: #000 !important; font-family: monospace; font-size: 16px;
            outline: none; margin-bottom: 20px; -webkit-appearance: none; opacity: 1 !important;
            -webkit-text-fill-color: #000 !important;
        }

        #pickerArea { display: none; margin-bottom: 25px; text-align: left; }
        #keyContainer { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .key-chip { padding: 10px 15px; background: #eee; border-radius: 15px; font-size: 0.8rem; font-weight: 700; color: #000; }
        .key-chip.selected { background: #000; color: #fff; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { padding: 20px; border-radius: 15px; border: none; font-size: 0.9rem; font-weight: 800; cursor: pointer; }
        .btn-main { background: #000; color: #fff; }
        .btn-sub { background: #eee; color: #000; }

        footer { margin-top: 50px; }
        .add-home { display: inline-block; background: #eee; color: #000; padding: 12px 24px; border-radius: 12px; font-weight: 700; text-decoration: none; margin-bottom: 20px; }
        .legal { font-size: 10px; color: #999; }
    </style>
</head>
<body>
<div class="container">
    <h1>JSON Key Picker</h1>
    <p class="subtitle">Extract specific keys from your JSON data.</p>

    <div class="label">Paste JSON Here</div>
    <textarea id="input" oninput="analyze()" style="color: #000 !important; -webkit-text-fill-color: #000 !important;"></textarea>

    <div id="pickerArea">
        <div class="label">Pick Keys</div>
        <div id="keyContainer"></div>
    </div>

    <div class="label">Result</div>
    <textarea id="output" readonly style="color: #000 !important; -webkit-text-fill-color: #000 !important;"></textarea>

    <div class="btn-group">
        <button class="btn btn-sub" onclick="location.reload()">Clear</button>
        <button class="btn btn-main" onclick="copyResult()">Copy Result</button>
    </div>

    <footer>
        <a href="#" class="add-home">Add to Home Screen</a>
        <p class="legal">No login / No tracking / No ads / Browser only<br>afrorakda © 2026</p>
    </footer>
</div>

<script>
    let rawData = null;
    let selectedKeys = new Set();

    function analyze() {
        const val = document.getElementById('input').value;
        try {
            rawData = JSON.parse(val);
            const sample = Array.isArray(rawData) ? rawData[0] : rawData;
            const container = document.getElementById('keyContainer');
            container.innerHTML = '';
            selectedKeys.clear();
            Object.keys(sample).forEach(key => {
                const chip = document.createElement('div');
                chip.className = 'key-chip';
                chip.textContent = key;
                chip.onclick = () => {
                    chip.classList.toggle('selected');
                    selectedKeys.has(key) ? selectedKeys.delete(key) : selectedKeys.add(key);
                    render();
                };
                container.appendChild(chip);
            });
            document.getElementById('pickerArea').style.display = 'block';
        } catch(e) {}
    }

    function render() {
        if(!rawData) return;
        const process = (obj) => {
            let res = {};
            selectedKeys.forEach(k => { if(k in obj) res[k] = obj[k]; });
            return res;
        };
        const result = Array.isArray(rawData) ? rawData.map(process) : process(rawData);
        document.getElementById('output').value = selectedKeys.size ? JSON.stringify(result, null, 2) : '';
    }

    function copyResult() {
        const out = document.getElementById('output');
        out.select();
        document.execCommand('copy');
        alert('Copied!');
    }
</script>
</body>
</html>
